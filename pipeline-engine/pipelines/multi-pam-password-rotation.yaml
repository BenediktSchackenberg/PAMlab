name: 'Multi-PAM Password Rotation'
description: 'Rotate and verify privileged accounts across CyberArk and Fudo-managed policies'
version: '2.0'

trigger:
  source: scheduled
  event: multi-pam-password-rotation
  verifyAfterRotation: true
  accounts:
    - id: '1'
      policyId: 'policy-1'
      label: 'db-admin'
    - id: '2'
      policyId: 'policy-2'
      label: 'app-admin'

steps:
  - name: 'Rotate managed accounts'
    foreach:
      items: '{{ trigger.accounts }}'
      as: account
      steps:
        - name: 'Rotate account in PAM systems'
          parallel:
            - name: 'Change CyberArk password'
              system: cyberark
              action: accounts.change-password
              params:
                id: '{{ vars.account.id }}'

            - name: 'Rotate Fudo policy'
              system: fudo-pam
              action: password-policies.rotate-now
              params:
                id: '{{ vars.account.policyId }}'

        - name: 'Verify CyberArk password'
          condition:
            truthy: '{{ trigger.verifyAfterRotation }}'
          system: cyberark
          action: accounts.verify-password
          params:
            id: '{{ vars.account.id }}'

        - name: 'Create completion note'
          system: remedy
          action: workorders.complete
          params:
            id: 'WO000000000001'
            notes: 'Rotation completed for {{ vars.account.label }}'

rollback: []
